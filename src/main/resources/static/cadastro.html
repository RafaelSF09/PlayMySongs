<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/padronizacao.css">
    <script src="js/cadastro.js"></script>
    <title>PlayMySongs</title>
</head>
<body onload="carregarStyles()">
<header>
    <a class="logo"  href="index.html"><img src="imgs/mysonglogo.png" alt="Logo PlayMySongs" /></a>
    <ul class="paths">
        <li><a href="pesquisa.html">Pesquisa</a></li>
        <li><a href="cadastro.html">Cadastrar</a></li>
    </ul>
</header>
<main>
    <div class="form">
        <h3>Cadastrar música</h3>
        <form>
            <input type="text" placeholder="Nome da música" id="title" name="title"/>
            <input type="text" placeholder="Nome do artista" id="artist" name="artist"/>
            <input type="file" accept="audio/*" id="musicFile" name="musicFile"/>
            <select id="style">
                <option disabled selected>Escolha um estilo</option>
            </select>
            <button type="submit" onclick="cadastrarMusica()">Cadastrar</button>
        </form>
    </div>
</main>

<footer>
    © 2026 Guilherme Quintiliano, Rafael Mendes, Rafael Fiori
</footer>
</body>
</html>
